# Site Settings
title: "Skills for Children"
description: "Free evidence-informed resources for childhood trauma recovery, resilience building, and emotional regulation"
url: "https://skillsforchildren.com"
baseurl: ""

# Build Settings
markdown: kramdown
permalink: /:title/

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:title/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - _relaunch_inspect
  - _resilient_forest_inspect
  - "Resilient Forest Website.zip"
  - "Skills for Children Website Relaunch.zip"
  - "A Journey of Brave Friends - Book Illustrations.zip"
  - Working_File.md
  - IMPLEMENTATION_GUIDE.md
  - "After Hours Tech"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO Settings
author: "Joshua Fisherkeller, MSW | Skills for Children"
logo: /assets/img/logos/sfk-logo-transparent.png

# Social
twitter:
  username: SkillsforChildren
youtube: SkillsforChildren
amazon_author: https://www.amazon.com/stores/Joshua-Fisherkeller/author/B0DPXN44YW

# Site Configuration
show_excerpts: true